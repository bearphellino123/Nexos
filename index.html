<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexos Browser</title>
    <style>
        /* CSS: Lo stile del browser */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
        }

        /* Barra di navigazione */
        .navbar {
            display: flex;
            background: #111;
            padding: 10px;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        input {
            flex-grow: 1;
            padding: 8px;
            border-radius: 5px;
            border: none;
            background: #222;
            color: white;
        }

        button {
            padding: 8px 15px;
            background: #0078d7;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover { background: #005a9e; }

        /* L'area dove caricano i siti */
        #nexos-viewport {
            flex-grow: 1;
            border: none;
            background: #fff;
        }

        /* Splash Screen iniziale */
        #splash-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .light-mode { background: #f4f4f4 !important; color: #000 !important; }
    </style>
</head>
<body>

    <div id="splash-screen" onclick="this.style.opacity='0'; setTimeout(()=>this.remove(), 500)">
        <h1 style="color: #00d2ff; text-shadow: 0 0 20px #00d2ff;">NEXOS</h1>
        <p>Clicca per avviare native alpha</p>
    </div>

    <div class="navbar">
        <button onclick="goHome()">🏠</button>
        <input type="text" id="search-input" placeholder="Cerca su Bing o inserisci URL...">
        <button onclick="navigate()">Vai</button>
        <button onclick="refresh()">🔄</button>
        <button onclick="setTheme('light')">☀️</button>
    </div>

    <iframe id="nexos-viewport" src="about:blank"></iframe>

    <script>
        const frame = document.getElementById('nexos-viewport');
        const input = document.getElementById('search-input');

        // Navigazione
        function navigate() {
            let q = input.value.trim();
            if (q !== "") {
                let url = (q.includes('.') && !q.includes(' ')) ? 
                    (q.startsWith('http') ? q : "https://" + q) :
                    "https://www.bing.com/search?q=" + encodeURIComponent(q);
                frame.src = url; 
            }
        }

        function goHome() {
            frame.src = "about:blank";
            input.value = "";
        }

        function refresh() { 
            frame.src = frame.src; 
        }

        function setTheme(mode) {
            if (mode === 'light') {
                document.body.classList.toggle('light-mode');
            }
        }

        // Tasto Invio per cercare
        input.addEventListener("keypress", (e) => { 
            if (e.key === "Enter") navigate(); 
        });
    </script>
</body>
</html>
